<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Rateio Beneficios</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:14px;color:#1a1a1a;background:#f0f0f0}
.wrap{max-width:980px;margin:0 auto;padding:2rem 1rem}
h1{font-size:20px;font-weight:600;margin-bottom:1.5rem}
.card{background:#fff;border:1px solid #ddd;border-radius:10px;padding:1.25rem;margin-bottom:1rem}
.ct{font-size:12px;font-weight:600;color:#888;margin-bottom:.75rem;text-transform:uppercase;letter-spacing:.05em}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:.75rem}
.ubox{border:1.5px dashed #ccc;border-radius:8px;padding:.75rem;position:relative;cursor:pointer;transition:background .15s}
.ubox:hover{background:#f9f9f9}
.ubox label{font-size:13px;color:#555;cursor:pointer;display:block}
.fn{font-size:11px;color:#16a34a;margin-top:4px;word-break:break-all;min-height:14px}
.ubox input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.row{display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;margin-bottom:.6rem}
.row label{font-size:13px;color:#555;min-width:130px}
.row input{height:34px;border:1px solid #ddd;border-radius:6px;padding:0 10px;font-size:13px}
.ptag{font-size:12px;padding:4px 10px;background:#f0f0f0;border-radius:6px;color:#555;font-style:italic}
.colmap{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:.5rem}
.colmap>div{display:flex;flex-direction:column;gap:2px}
.colmap label{font-size:12px;color:#666}
.colmap select{height:32px;border:1px solid #ddd;border-radius:6px;padding:0 8px;font-size:12px}
.btn{height:38px;padding:0 1.25rem;border:1px solid #ccc;border-radius:8px;background:#fff;color:#111;font-size:14px;font-weight:500;cursor:pointer}
.btn:hover{background:#f0f0f0}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-p{background:#111;color:#fff;border-color:#111}
.btn-p:hover{background:#333}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1rem}
.metric{background:#f5f5f5;border-radius:8px;padding:.75rem 1rem}
.metric .lb{font-size:12px;color:#888;margin-bottom:4px}
.metric .vl{font-size:22px;font-weight:600}
.alert{border-radius:8px;padding:.5rem .75rem;font-size:13px;margin-bottom:.5rem}
.aw{background:#fffbeb;border:1px solid #f59e0b;color:#92400e}
.ae{background:#fef2f2;border:1px solid #ef4444;color:#991b1b}
.as{background:#f0fdf4;border:1px solid #22c55e;color:#166534}
.tw{overflow-x:auto;max-height:380px;overflow-y:auto;border:1px solid #e0e0e0;border-radius:8px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{position:sticky;top:0;background:#f5f5f5;padding:7px 10px;text-align:left;font-weight:600;border-bottom:1px solid #ddd;white-space:nowrap}
td{padding:5px 10px;border-bottom:1px solid #f0f0f0;white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis}
tr:hover td{background:#fafafa}
.te{background:#fef3c7;color:#92400e;border-radius:4px;padding:2px 7px;font-size:11px;font-weight:600}
.tr2{background:#dbeafe;color:#1e40af;border-radius:4px;padding:2px 7px;font-size:11px;font-weight:600}
.hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
<h1>⚙️ Rateio Beneficios</h1>

<div class="card">
  <div class="ct">1. Uploads</div>
  <div class="grid4">
    <div class="ubox"><label>Razão / NF <span style="color:red">*</span><div class="fn" id="fn-nf">nenhum arquivo</div></label><input type="file" id="f-nf" accept=".xlsx,.xls,.csv"></div>
    <div class="ubox"><label>Benefícios (CPF+Valor) <span style="color:red">*</span><div class="fn" id="fn-ben">nenhum arquivo</div></label><input type="file" id="f-ben" accept=".xlsx,.xls,.csv"></div>
    <div class="ubox"><label>Base com CPF (até 12) <span style="color:red">*</span><div class="fn" id="fn-b1">nenhum arquivo</div></label><input type="file" id="f-b1" accept=".xlsx,.xls,.csv" multiple></div>
    <div class="ubox"><label>Base sem CPF (até 12) <span style="color:red">*</span><div class="fn" id="fn-b2">nenhum arquivo</div></label><input type="file" id="f-b2" accept=".xlsx,.xls,.csv" multiple></div>
    <div class="ubox"><label>De-Para <span style="color:red">*</span><div class="fn" id="fn-dp">nenhum arquivo</div></label><input type="file" id="f-dp" accept=".xlsx,.xls"></div>
  </div>
</div>

<div class="card">
  <div class="ct">2. Parâmetros</div>
  <div class="row"><label>Data do lançamento</label><input type="date" id="p-data" oninput="updatePreview()"></div>
  <div class="row"><label>Solicitante (login)</label><input type="text" id="p-sol" placeholder="ex: douglas.leitao" style="width:260px"></div>
  <div class="row"><label style="font-size:12px;color:#888">Tipo lançamento</label><span class="ptag" id="tipo-preview">RATEIO [conta gerencial] MM/AAAA</span></div>
</div>

<div id="sec-map" class="card hidden"><div class="ct">3. Mapeamento — Razão/NF</div><div class="colmap" id="map-nf"></div></div>
<div id="sec-map-ben" class="card hidden"><div class="ct">Mapeamento — Benefícios</div><div class="colmap" id="map-ben"></div></div>


<div style="margin-bottom:1rem">
  <button class="btn btn-p" id="btn-run" disabled onclick="runRateio()">▶ Processar Rateio</button>
</div>

<div id="result-area" class="hidden">
  <div class="card">
    <div class="ct">Resultado</div>
    <div class="metrics" id="metrics"></div>
    <div id="alerts-area"></div>
    <div style="margin-bottom:.75rem" id="dl-area"></div>
    <div style="font-size:12px;color:#888;margin-bottom:.5rem" id="status-msg"></div>
    <div class="tw"><table id="preview-table"></table></div>
  </div>
</div>
</div>

document.getElementById("f-b1").addEventListener("change",async function(){
  const files=Array.from(this.files); if(!files.length) return;
  document.getElementById("fn-b1").textContent=files.length+" arquivo(s)";
  const allRows=[];
  for(const f of files){ const d=await readFile(f); allRows.push(...d.rows); }
  // Dedup por CPF (normalizado 11 dígitos) — sem critério de mês
  const seen=new Set();
  const deduped=allRows.filter(r=>{
    const cpf=normCPF(r["CPF"]||r["cpf"]||"");
    if(!cpf||seen.has(cpf)) return false;
    seen.add(cpf); return true;
  });
  parsed["b1"]={rows:deduped,cols:deduped.length?Object.keys(deduped[0]):[]};
  checkReady();
});

document.getElementById("f-b2").addEventListener("change",async function(){
  const files=Array.from(this.files); if(!files.length) return;
  document.getElementById("fn-b2").textContent=files.length+" arquivo(s)";
  const allRows=[];
  for(const f of files){ const d=await readFile(f); allRows.push(...d.rows); }
  const chapMap={};
  allRows.forEach(r=>{
    const chap=normChapa(r["CODCHAPA"]||"");
    if(!chap) return;
    const score=Number(r["ANOCOMP"]||0)*100+Number(r["MESCOMP"]||0);

  });

  parsed["b2"]={rows:deduped,cols:deduped.length?Object.keys(deduped[0]):[]};

});

function checkReady(){
  document.getElementById("btn-run").disabled=!(["nf","ben","b1","b2","dp"].every(x=>parsed[x]));

function readFile(f){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>{
      const wb=XLSX.read(e.target.result,{type:"binary",raw:false,cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:""});
      res({rows,cols:rows.length?Object.keys(rows[0]):[]});
    };
    r.readAsBinaryString(f);
  });
}

function best(cols,hints){
  for(const h of hints){ const f=cols.find(c=>String(c).toLowerCase().includes(h)); if(f) return f; }
  return cols[0]||"";
}

function renderMap(key,cols){
  const sm={nf:"sec-map",ben:"sec-map-ben",b1:"sec-map-b1",b2:"sec-map-b2"};
  const cm={nf:"map-nf",ben:"map-ben",b1:"map-b1",b2:"map-b2"};
  document.getElementById(sm[key]).classList.remove("hidden");
  const cont=document.getElementById(cm[key]); cont.innerHTML="";
  DEFS[key].forEach(d=>{
    const w=document.createElement("div");
    const l=document.createElement("label"); l.textContent=d.label; l.htmlFor=d.id;
    const s=document.createElement("select"); s.id=d.id;
    const n=document.createElement("option"); n.value=""; n.textContent="— não usar —"; s.appendChild(n);
    cols.forEach(c=>{ const o=document.createElement("option"); o.value=c; o.textContent=c; s.appendChild(o); });
    s.value=best(cols,d.h);
    w.appendChild(l); w.appendChild(s); cont.appendChild(w);
  });
}

      const score=Number(r["ANOCOMP"]||0)*100+Number(r["MESCOMP"]||0);
      if(!chap) return;

      const fData=filialByKey[fKey]||{};
      const descCC=ccDescMap[cc]||"";
      const entry={cc, descCC, codFilial:String(fData.cod||""), nomeFilial:fData.nome||"", score};

      if(nomeEmp&&(!nomeInfoB2[nomeEmp]||score>nomeInfoB2[nomeEmp].score)) nomeInfoB2[nomeEmp]=entry;
    });

    // Passo 2: Base com CPF x Base sem CPF -> base consolidada

      const nome=normNome(r["Nome do Funcionário"]||"");
      if(!cpf) return;
      let info=chapInfo[chap]||null;
      if(!info) info=nomeInfoB2[nome]||null;
      if(info){
        cpfInfo[cpf]={chap, cc:info.cc, descCC:info.descCC, codFilial:info.codFilial, nomeFilial:info.nomeFilial, nome};
      } else {
        b1SemMatch.push({cpf, chap, nome});
      }
    });

    // Passo 3: Benefícios x base consolidada pelo CPF
    const semCC=[];
    const colabs=[];
    parsed.ben.rows.forEach(r=>{
      const cpf=normCPF(r[mb["b-cpf"]]||"");
      const val=toN(r[mb["b-val"]]);
      const nomeColab=normNome(r[mb["b-nom"]]||"");
      if(!cpf||!val) return;
      let info=cpfInfo[cpf]||null;
      // fallback: busca pelo nome do colaborador no índice da Base sem CPF
      if(!info){
        const infoB2=nomeInfoB2[nomeColab]||null;
        if(infoB2) info={chap:"", cc:infoB2.cc, descCC:infoB2.descCC, codFilial:infoB2.codFilial, nomeFilial:infoB2.nomeFilial, nome:nomeColab};
      }
      if(!info||!info.cc){ semCC.push({cpf, nome:nomeColab}); return; }
      colabs.push({cpf, chap:info.chap, cc:info.cc, codFilial:info.codFilial, nomeFilial:info.nomeFilial, val});
    });

    // Filtrar NF (remover eventos)
    const nfF=parsed.nf.rows.filter(r=>!/^\d/.test(String(r[mn["nf-hist"]]||"").trim()));

    const out=[];

    nfF.forEach(orig=>{
      const hist   =String(orig[mn["nf-hist"]]||"").trim();
      const valOrig=toN(orig[mn["nf-val"]]);
      const ccOrig =padCC(orig[mn["nf-cc"]]);
      const cger   =mn["nf-cger"]?String(orig[mn["nf-cger"]]||"").trim():"";
      const tipo   ="RATEIO "+cger+" "+mmaaaa;
      const sc     =mn["nf-sc"]    ?orig[mn["nf-sc"]]    ||"":"";
      const pc     =mn["nf-pc"]    ?orig[mn["nf-pc"]]    ||"":"";
      const clifor =mn["nf-clifor"]?orig[mn["nf-clifor"]]||"":"";
      const nfant  =mn["nf-nfant"] ?orig[mn["nf-nfant"]] ||"":"";
      const docNum =mn["nf-doc"]   ?orig[mn["nf-doc"]]   ||"":"";

      // Filial da NF (6 dígitos)
      const codFilNF=pad6(orig[mn["nf-codfil"]]||"");
      const nomeFilNF=filialByCod[String(parseInt(codFilNF,10))]||"";

      // Conta contábil para EST (baseada no CC original da NF)
      const ccPrefixOrig=ccOrig.substring(0,2);
      const contaMapOrig=(ccPrefixOrig==="01")?m4020:m4010;
      const cgerKey=cger.trim().toUpperCase();
      const contaOrig=contaMapOrig[cgerKey]||{};

      // --- ESTORNO ---
      const est={};
      est["Tipo Lçmnto"]                   =tipo;
      est["Id_Recno"]                      ="";
      est["Status"]                        ="REAL "+ano;
      est["Código Filial"]                 =codFilNF;
      est["Nome Filial"]                   =nomeFilNF;
      est["Grupo"]                         =contaOrig["Grupo"]         ||"";
      est["Sub Grupo"]                     =contaOrig["Sub Grupo"]     ||"";
      est["Código Conta Contábil"]         =contaOrig["Cod Conta"]     ||"";
      est["Descrição da Conta Contábil"]   =contaOrig["Conta Contabil"]||"";
      est["Descrição da Conta Gerencial"]  =cger;
      est["Código Centro de Custo"]        =ccOrig;
      est["Descrição Centro de Custo Contábil"]=ccDescMap[ccOrig]||"";
      est["Centro de Custo Gerencial"]     =ccDescMap[ccOrig]||"";
      est["Mês"]                           =mmaaaa;
      est["Data"]                          =dataFmt;
      est["Valor"]                         =-(valOrig);
      est["Histórico"]                     ="EST "+hist;
      est["Documento/Número"]              =docNum;
      est["PC/Observação"]                 ="";
      est["Cli/For"]                       =clifor;
      est["Nome Fantasia"]                 =nfant;
      est["SC/Número"]                     =sc;
      est["PC/Número"]                     =pc;
      est["PC/Item"]                       ="";
      est["Solicitante"]                   =sol;
      est.$TAG="EST";
      out.push(est);

      // Passo 4: filtrar pela(s) filial(is) — suporta agrupamento via DEPARA_AG
      const codFilNFNorm=String(parseInt(codFilNF,10));
      const filiaisRateio=getFiliais(cger,codFilNF);
      const filiaisNorm=filiaisRateio.map(f=>String(parseInt(f,10)));
      const colabsFil=colabs.filter(c=>filiaisNorm.includes(String(parseInt(String(c.codFilial||"0"),10))));
      const totalPeso=colabsFil.reduce((s,c)=>s+c.val,0);

      if(colabsFil.length===0){
        out.push({...est, "Histórico":"RAT "+hist, "Valor":valOrig, "Código Centro de Custo":ccOrig, $TAG:"RAT_VAZIO"});
        return;
      }

      // Agrupar por CC mantendo filial (todos da mesma filial da NF)
      const ccPeso={};
      const ccFilial={};
      colabsFil.forEach(c=>{
        ccPeso[c.cc]=(ccPeso[c.cc]||0)+c.val;
        ccFilial[c.cc]={codFilial:c.codFilial, nomeFilial:c.nomeFilial};
      });
      const ccList=Object.keys(ccPeso);

      // Passo 5: uma linha RAT por CC
      let soma=0;
      ccList.forEach((cc,i)=>{
        let vr;
        if(i===ccList.length-1){
          vr=parseFloat((valOrig-soma).toFixed(2));
        } else {
          vr=parseFloat((valOrig*(ccPeso[cc]/totalPeso)).toFixed(2));
          soma+=vr;
        }

        const filCodRaw=pad6(ccFilial[cc].codFilial);
        const filNomeRaw=ccFilial[cc].nomeFilial||filialByCod[String(parseInt(String(ccFilial[cc].codFilial||"0"),10))]||"";
        const depCC=applyDeparaCC(filCodRaw,cc);
        const filCod=depCC?depCC.filCod:filCodRaw;
        const filNome=depCC?depCC.filNome:filNomeRaw;

        const ccPrefixDest=cc.substring(0,2);
        const contaMapDest=(ccPrefixDest==="01")?m4020:m4010;
        const contaDest=contaMapDest[cgerKey]||{};

        const rat={};
        rat["Tipo Lçmnto"]                   =tipo;
        rat["Id_Recno"]                      ="";
        rat["Status"]                        ="REAL "+ano;
        rat["Código Filial"]                 =filCod;
        rat["Nome Filial"]                   =filNome;
        rat["Grupo"]                         =contaDest["Grupo"]         ||"";
        rat["Sub Grupo"]                     =contaDest["Sub Grupo"]     ||"";
        rat["Código Conta Contábil"]         =contaDest["Cod Conta"]     ||"";
        rat["Descrição da Conta Contábil"]   =contaDest["Conta Contabil"]||"";
        rat["Descrição da Conta Gerencial"]  =cger;
        rat["Código Centro de Custo"]        =cc;
        rat["Descrição Centro de Custo Contábil"]=ccDescMap[cc]||"";
        rat["Centro de Custo Gerencial"]     =ccDescMap[cc]||"";
        rat["Mês"]                           =mmaaaa;
        rat["Data"]                          =dataFmt;
        rat["Valor"]                         =vr;
        rat["Histórico"]                     ="RAT "+hist;
        rat["Documento/Número"]              =docNum;
        rat["PC/Observação"]                 ="";
        rat["Cli/For"]                       =clifor;
        rat["Nome Fantasia"]                 =nfant;
        rat["SC/Número"]                     =sc;
        rat["PC/Número"]                     =pc;
        rat["PC/Item"]                       ="";
        rat["Solicitante"]                   =sol;
        rat.$TAG="RAT";
        out.push(rat);
      });
    });

    // Dedup semCC
    const semCCUniq=[...new Set(semCC)];
    outputRows=out;
    showResult(out,semCCUniq,nfF.length);
  } catch(e){ alert("Erro: "+e.message); console.error(e); }
}

function showResult(rows,semCC,nfCount){
  const est=rows.filter(r=>r.$TAG==="EST");
  const rat=rows.filter(r=>r.$TAG==="RAT");
  const saldo=parseFloat((
    est.reduce((s,r)=>s+toN(r["Valor"]),0)+
    rat.reduce((s,r)=>s+toN(r["Valor"]),0)
  ).toFixed(2));

  document.getElementById("metrics").innerHTML=`
    <div class="metric"><div class="lb">Linhas NF rateadas</div><div class="vl">${nfCount}</div></div>
    <div class="metric"><div class="lb">Linhas EST</div><div class="vl">${est.length}</div></div>
    <div class="metric"><div class="lb">Linhas RAT</div><div class="vl">${rat.length}</div></div>
    <div class="metric"><div class="lb">Saldo EST+RAT</div><div class="vl" style="color:${Math.abs(saldo)<0.02?"#16a34a":"#dc2626"}">${saldo.toLocaleString("pt-BR",{minimumFractionDigits:2})}</div></div>`;

  const al=document.getElementById("alerts-area"); al.innerHTML="";
  if(semCC.length) al.innerHTML+=`<div class="alert aw">⚠️ ${semCC.length} CPF(s) sem CC encontrado — detalhes na aba Pendencias do Excel</div>`;
  if(Math.abs(saldo)>0.02) al.innerHTML+=`<div class="alert ae">❌ Saldo fora de zero: ${saldo}</div>`;
  else al.innerHTML+=`<div class="alert as">✅ Saldo zerado — rateio consistente</div>`;

  buildDownload(rows,semCC,saldo,typeof b1SemMatch!=="undefined"?b1SemMatch:[]);

  const PREV=["Tipo Lçmnto","Histórico","Código Filial","Código Centro de Custo","Valor","$TAG"];
  const tbl=document.getElementById("preview-table"); tbl.innerHTML="";
  const thead=document.createElement("thead"),hr=document.createElement("tr");
  PREV.forEach(c=>{ const t=document.createElement("th"); t.textContent=c==="$TAG"?"Tag":c; hr.appendChild(t); });
  thead.appendChild(hr); tbl.appendChild(thead);
  const tbody=document.createElement("tbody");
  rows.slice(0,300).forEach(r=>{
    const tr=document.createElement("tr");
    PREV.forEach(c=>{
      const td=document.createElement("td");
      if(c==="$TAG") td.innerHTML=r.$TAG==="EST"?'<span class="te">EST</span>':'<span class="tr2">RAT</span>';
      else{ const v=r[c]; td.textContent=typeof v==="number"?v.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2}):String(v||""); }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  document.getElementById("status-msg").textContent=rows.length>300?`Prévia: 300 de ${rows.length} linhas — Excel traz todas`:`${rows.length} linhas no total`;
  document.getElementById("result-area").classList.remove("hidden");
}

const OUTPUT_COLS=[
  "Tipo Lçmnto","Id_Recno","Status","Código Filial","Nome Filial",
  "Grupo","Sub Grupo","Código Conta Contábil","Descrição da Conta Contábil","Descrição da Conta Gerencial",
  "Código Centro de Custo","Descrição Centro de Custo Contábil","Centro de Custo Gerencial",
  "Mês","Data","Valor","Histórico","Documento/Número","PC/Observação",
  "Cli/For","Nome Fantasia","SC/Número","PC/Número","PC/Item","Solicitante"
];

function buildDownload(rows, semCC, saldo, b1SemMatch){
  const dl=document.getElementById("dl-area");
  try{
    // Aba Rateio
    const aoa=[OUTPUT_COLS.map(String)];
    rows.forEach(r=>{
      aoa.push(OUTPUT_COLS.map(c=>{
        const v=r[c];
        if(v===undefined||v===null) return "";
        if(typeof v==="number") return v;
        return String(v);
      }));
    });
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Rateio");

    // Aba Pendencias
    const aoaPend=[["Tipo","CPF","Nome","Chapa"]];
    if(semCC&&semCC.length){
      semCC.forEach(p=>aoaPend.push(["Benefício sem CC",p.cpf||p,p.nome||"",""]));
    }
    if(b1SemMatch&&b1SemMatch.length){
      b1SemMatch.forEach(p=>aoaPend.push(["Colaborador sem match na Folha",p.cpf||"",p.nome||"",p.chap||""]));
    }
    if(Math.abs(saldo||0)>0.02){
      aoaPend.push(["Saldo fora de zero","","Saldo: "+Number(saldo).toLocaleString("pt-BR",{minimumFractionDigits:2})]);
    }
    if(aoaPend.length>1){
      const wsPend=XLSX.utils.aoa_to_sheet(aoaPend);
      XLSX.utils.book_append_sheet(wb,wsPend,"Pendencias");
    }

    XLSX.writeFile(wb,"rateio_vr.xlsx");
    dl.innerHTML=`<div class="alert as">✅ Download iniciado — verifique sua pasta de downloads</div>`;
  } catch(e){
    dl.innerHTML=`<div class="alert ae">❌ Erro ao gerar arquivo: ${e.message}</div>`;
    console.error(e);
  }
}
</script>
